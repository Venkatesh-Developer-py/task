<!DOCTYPE html>
<html>
<head>
<title>Google Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f5f6fa;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card-box{
background:white;
padding:40px;
border-radius:20px;
width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

.google-icon{
width:70px;
margin-bottom:15px;
}

.continue-btn{
background:#ff6b00;
color:white;
border:none;
width:100%;
padding:12px;
border-radius:10px;
font-weight:600;
margin-top:20px;
}
</style>

</head>

<body>

<div class="card-box">

<img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" class="google-icon">

<h3 class="fw-bold">Sign in with Google</h3>

<p class="text-muted">
You are about to sign in using your Google account
</p>

<form method="post">
{% csrf_token %}
<button class="continue-btn">Continue</button>
</form>

</div>

</body>
</html>
