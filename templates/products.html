<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.navbar-custom{
background:#ff6b00;
padding:15px;
}

.navbar-custom a{
color:white;
font-weight:600;
margin-right:20px;
text-decoration:none;
}

.product-card{
background:white;
border-radius:15px;
padding:15px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
transition:0.3s;
height:100%;
}

.product-card:hover{
transform:translateY(-5px);
box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

.product-img{
height:160px;
object-fit:contain;
margin-bottom:10px;
}

.price{
color:#ff6b00;
font-weight:bold;
font-size:18px;
}

.cart-btn{
background:#ff6b00;
color:white;
border:none;
padding:8px 15px;
border-radius:8px;
font-weight:600;
}

.cart-btn:hover{
background:#e65c00;
}

</style>

</head>

<body>


<div class="navbar-custom text-end">
<a href="/cart/">Cart</a>
<a href="/profile/">Profile</a>
</div>

<div class="container mt-4">

<h2 class="mb-4 fw-bold">Products</h2>

<div class="row">

{% for i in data %}

<div class="col-md-3 mb-4">

<div class="product-card">

<img src="{{ i.image.url }}" class="product-img w-100">
<hr>

<h5 class="fw-bold">{{ i.name }}</h5>

<p class="price">₹ {{ i.price }}</p>
<p>{{ i.description }}</p>
<hr>
<div class="d-grid gap-2">

<a href="/add/{{ i.id }}">
<button class="cart-btn">Add to Cart</button>
</a>

<a href="/buy-now/{{ i.id }}">
<button class="btn btn-dark fw-bold">Buy Now</button>
</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
