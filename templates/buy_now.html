<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
}

.buy-card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
margin-top:60px;
}

.price{
color:#ff6b00;
font-size:22px;
font-weight:bold;
}

.order-btn{
background:#ff6b00;
color:white;
border:none;
padding:12px;
border-radius:10px;
font-weight:600;
width:100%;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="buy-card text-center">

{% if success %}
<h3 class="text-success">{{ success }}</h3>
<a href="/products/" class="btn btn-dark mt-3">Back to Shop</a>

{% else %}

<img src="{{ product.image.url }}" style="height:200px">

<h3 class="mt-3">{{ product.name }}</h3>

<p class="price">₹ {{ product.price }}</p>

<p>{{ product.description }}</p>

<a href="/place-order/{{ product.id }}/">
<button class="order-btn">Confirm Order</button>
</a>

{% endif %}

</div>

</div>

</div>

</div>

</body>
</html>
