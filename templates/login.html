<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f5f6fa;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    background:white;
    padding:40px;
    border-radius:18px;
    width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.login-icon{
    width:60px;
    height:60px;
    background:#ff6b00;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    margin-bottom:20px;
}

.login-btn{
    background:#ff6b00;
    color:white;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-weight:600;
}

.google-btn{
    border:1px solid #ddd;
    width:100%;
    padding:10px;
    border-radius:10px;
    background:white;
    font-weight:500;
}

.google-btn:hover{
    background:#f1f1f1;
}

.or-text{
    text-align:center;
    margin:15px 0;
    color:#888;
}

</style>

</head>

<body>

<div class="login-card">

<div class="login-icon">
<span style="color:white;font-size:28px;">➜</span>
</div>

<h3 class="text-center fw-bold">Welcome Back</h3>
<p class="text-center text-muted">Sign in to your account</p>

<form method="post">
{% csrf_token %}

<label class="fw-bold mb-1">Username</label>
<input name="username" class="form-control mb-3" placeholder="Enter username" required>

<label class="fw-bold mb-1">Password</label>
<input name="password" type="password" class="form-control mb-3" placeholder="Enter password" required>

<button class="login-btn">Sign In</button>

</form>

{% load socialaccount %}

<div class="or-text">OR</div>

<a href="{% provider_login_url 'google' %}" class="google-btn d-flex align-items-center justify-content-center gap-2 text-decoration-none">
    <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" width="20">
    <span>Continue with Google</span>
</a>

<p class="text-center mt-4">
Don't have an account?
<a href="/register/" style="color:#ff6b00;font-weight:600;text-decoration:none;">Create one</a>
</p>

{% for m in messages %}
<p class="text-success text-center fw-bold">{{ m }}</p>
{% endfor %}

</div>

</body>
</html>
