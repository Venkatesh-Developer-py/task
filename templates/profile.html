<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f5f6fa;
}


.navbar{
background:white;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}


.profile-card{
background:white;
border-radius:15px;
padding:35px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
max-width:600px;
margin:auto;
}


.save-btn{
background:#ff6b00;
color:white;
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-weight:600;
}


.profile-img{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
border:4px solid #eee;
}

.nav-link-custom{
    text-decoration:none;
    color:#333;
    font-weight:500;
    margin-right:18px;
    transition:0.3s;
}

.nav-link-custom:hover{
    color:#ff6b00;
}

.nav-link-custom.active{
    color:#ff6b00;
    font-weight:600;
}
</style>

</head>

<body>


<nav class="navbar p-3">
<div class="container-fluid">

<h4 class="mb-0">Dashboard</h4>

<div class="nav-links">

{% if request.user.is_staff %}
<a href="/staff-products/" class="nav-link-custom">Products</a>
{% else %}
<a href="/products/" class="nav-link-custom">Products</a>
{% endif %}

<a href="/profile/" class="nav-link-custom active">Profile</a>
<a href="/logout/" class="nav-link-custom">Logout</a>

</div>

</div>
</nav>


<div class="container mt-5">

<div class="profile-card text-center">

<h3 class="mb-4">Create / Update Profile</h3>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}


{% if profile.image %}
<img src="{{ profile.image.url }}" class="profile-img mb-3">
{% else %}
<img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="profile-img mb-3">
{% endif %}

{% comment %} <input type="file" name="image" class="form-control mb-3"> {% endcomment %}

<h6 class="text-start mb-1 fw-bold">Username:</h6>
<input class="form-control mb-3" value="{{ request.user.username }}" disabled>
<h6 class="text-start mb-1 fw-bold">Email:</h6>
<input class="form-control mb-3" value="{{ request.user.email }}" disabled>

<h6 class="text-start mb-1 fw-bold">Full Address:</h6>
<textarea name="address" class="form-control mb-3"
placeholder="Enter your full address">{{ profile.address }}</textarea>

<h6 class="text-start mb-1 fw-bold">Mobile Number:</h6>
<input name="mobile" class="form-control mb-4"
placeholder="Enter mobile number"
value="{{ profile.mobile }}">

<button class="save-btn">💾 Save Profile</button>

</form>

</div>

</div>

</body>
</html>
