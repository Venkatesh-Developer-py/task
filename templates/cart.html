<!DOCTYPE html>
<html>
<head>

<title>My Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f3f6;
}

/* NAVBAR */

.navbar-custom{
background:white;
padding:15px 40px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-weight:700;
font-size:22px;
color:#ff6b00;
}

.navbar-custom a{
text-decoration:none;
color:#333;
font-weight:500;
margin-left:25px;
transition:0.3s;
}

.navbar-custom a:hover{
color:#ff6b00;
}

/* CART CARD */

.cart-card{
background:white;
border-radius:14px;
padding:18px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
margin-bottom:18px;
transition:0.3s;
}

.cart-card:hover{
transform:translateY(-3px);
}

/* IMAGE */

.product-img{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
}

/* QTY BUTTON */

.qty-box{
display:flex;
align-items:center;
border:1px solid #ddd;
border-radius:8px;
overflow:hidden;
width:120px;
}

.qty-btn{
background:#ff6b00;
color:white;
border:none;
width:40px;
height:38px;
font-size:20px;
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
}

.qty-btn:hover{
background:#e65c00;
color:white;
}

.qty-text{
width:40px;
text-align:center;
font-weight:600;
}

/* REMOVE */

.remove{
color:red;
font-size:13px;
text-decoration:none;
}

.remove:hover{
text-decoration:underline;
}

/* TOTAL BOX */

.total-box{
background:white;
border-radius:15px;
padding:25px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
position:sticky;
top:20px;
}

.buy-btn{
background:#ff6b00;
color:white;
font-weight:600;
border:none;
padding:12px;
border-radius:10px;
width:100%;
}

.buy-btn:hover{
background:#e65c00;
}

/* EMPTY */

.empty{
text-align:center;
margin-top:120px;
color:#888;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar-custom">
<div class="logo">MyShop</div>

<div>
<a href="/products/">Products</a>
<a href="/profile/">Profile</a>
</div>
</div>


<div class="container mt-4">

<div class="row">

<!-- LEFT CART ITEMS -->

<div class="col-lg-8">

<h4 class="fw-bold mb-4">Shopping Cart</h4>

{% if items %}

{% for i in items %}

<div class="cart-card d-flex justify-content-between align-items-center">

<div class="d-flex align-items-center">

<img src="{{ i.product.image.url }}" class="product-img me-3">

<div>

<h5 class="fw-bold mb-1">{{ i.product.name }}</h5>
<p class="text-success fw-bold mb-2">₹ {{ i.product.price }}</p>

<div class="qty-box">

<a href="/decrease/{{ i.id }}/" class="qty-btn">−</a>

<div class="qty-text">{{ i.quantity }}</div>

<a href="/increase/{{ i.id }}/" class="qty-btn">+</a>

</div>

<a href="/remove/{{ i.id }}/" class="remove mt-2 d-block">Remove</a>

</div>

</div>

<h5 class="fw-bold">₹ {{ i.total_price }}</h5>

</div>

{% endfor %}

{% else %}

<div class="empty">
<h3>Your cart is empty 🛒</h3>
<a href="/products/" class="btn btn-dark mt-3">Shop Now</a>
</div>

{% endif %}

</div>


<!-- RIGHT TOTAL -->

<div class="col-lg-4">

<div class="total-box">

<h5 class="fw-bold">Price Details</h5>
<hr>

<h4>Total Amount</h4>
<h3 class="text-success fw-bold">₹ {{ total }}</h3>

<a href="/buy-cart/">
<button class="buy-btn mt-3">Proceed to Buy</button>
</a>

</div>

</div>

</div>

</div>

</body>
</html>
