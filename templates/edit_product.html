<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Edit Product</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f6fa;
}

.navbar{
    background:white;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.edit-card{
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.update-btn{
    background:#ff6b00;
    color:white;
    border:none;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar p-3">
<div class="container-fluid">
    <h4>Products</h4>

    <div>
        <a href="/staff-products/" class="me-3">Dashboard</a>
        <a href="/logout/">Logout</a>
    </div>
</div>
</nav>

<!-- EDIT FORM -->
<div class="container mt-4">

<div class="edit-card">

<h4 class="mb-4">Edit Product</h4>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}

<div class="row mb-3">
<div class="col">
<label>Product Name</label>
<input name="name" class="form-control" value="{{ product.name }}">
</div>

<div class="col">
<label>Price</label>
<input name="price" class="form-control" value="{{ product.price }}">
</div>
</div>

<div class="mb-3">
<label>Description</label>
<textarea name="description" class="form-control">{{ product.description }}</textarea>
</div>

<div class="mb-3">
<label>Product Image</label>
<input type="file" name="image" class="form-control">
</div>

<button class="btn update-btn">Update Product</button>
<a href="/staff-products/" class="btn btn-secondary">Cancel</a>

</form>

</div>

</div>

</body>
</html>
